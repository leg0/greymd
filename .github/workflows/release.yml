name: Release

on:
  push:
    tags:
      - 'release_v*'
      - 'prerelease_v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: greymd-linux-x64
            features: ""
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: greymd-math-linux-x64
            features: math
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: greymd-windows-x64
            features: ""
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: greymd-math-windows-x64
            features: math
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }} ${{ matrix.features && format('--features {0}', matrix.features) || '' }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }} ${{ matrix.features && format('--features {0}', matrix.features) || '' }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p pkg/bin pkg/share/greymd/themes
          cp target/${{ matrix.target }}/release/greymd pkg/bin/
          for d in examples/themes/*/; do
            name=$(basename "$d")
            mkdir -p "pkg/share/greymd/themes/$name"
            cp "$d"* "pkg/share/greymd/themes/$name/" 2>/dev/null || true
          done
          tar czf ${{ matrix.artifact }}.tar.gz -C pkg bin share
          rm -r pkg

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Force -Path pkg/bin, pkg/share/greymd/themes
          Copy-Item "target/${{ matrix.target }}/release/greymd.exe" pkg/bin/
          Get-ChildItem examples/themes -Directory | ForEach-Object {
            $dest = "pkg/share/greymd/themes/$($_.Name)"
            New-Item -ItemType Directory -Force -Path $dest
            Copy-Item "$($_.FullName)/*" $dest/
          }
          Compress-Archive -Path "pkg/bin", "pkg/share" -DestinationPath "${{ matrix.artifact }}.zip"
          Remove-Item -Recurse "pkg"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release type
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == prerelease_v* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#prerelease_v}" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#release_v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: artifacts/*
