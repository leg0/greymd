name: Release

on:
  push:
    tags:
      - 'release_v*'
      - 'prerelease_v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: greymd-linux-x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: greymd-windows-x64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Run tests
        run: cargo test --release --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          cp target/${{ matrix.target }}/release/greymd greymd
          tar czf ${{ matrix.artifact }}.tar.gz greymd
          rm greymd

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          Copy-Item "target/${{ matrix.target }}/release/greymd.exe" "greymd.exe"
          Compress-Archive -Path "greymd.exe" -DestinationPath "${{ matrix.artifact }}.zip"
          Remove-Item "greymd.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Determine release type
        id: meta
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ "$TAG" == prerelease_v* ]]; then
            echo "prerelease=true" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#prerelease_v}" >> "$GITHUB_OUTPUT"
          else
            echo "prerelease=false" >> "$GITHUB_OUTPUT"
            echo "version=${TAG#release_v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.meta.outputs.version }}
          prerelease: ${{ steps.meta.outputs.prerelease == 'true' }}
          generate_release_notes: true
          files: artifacts/*
